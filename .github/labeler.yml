app:
  - changed-files:
    - any-glob-to-any-file: 'app/**'

sender:
  - changed-files:
    - any-glob-to-any-file: 'sender/**'

shared:
  - changed-files:
    - any-glob-to-any-file: 'shared/**'

infra:
  - changed-files:
    - any-glob-to-any-file: 'infra/**'

ci:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
